# Two automations for the Coder DevEx audit.
# Paste these into Settings → Automations & Scenes → Create automation → ⋮ → Edit in YAML.
#
# IMPORTANT: replace YOUR_CODER_URL with your own Coder deployment URL
# (e.g. https://coder.example.com — no trailing slash). The chat URL
# pattern is `<your_coder_url>/chats/<chat_id>`.
#
# Tip: if you don't want to repeat the URL, store it once in
# secrets.yaml (`coder_url: https://coder.example.com`) and reference
# it from configuration.yaml as an `input_text` helper with
# `initial: !secret coder_url`, then use
# `{{ states('input_text.coder_url') }}/chats/{{ chat.chat_id }}` here.

- alias: "Coder — DevEx audit (start)"
  description: >
    Kick off a Coder chat to audit Linear Dev Ex issues.
    Fires at 09:00 Mon–Fri and on manual button press.
  mode: single
  triggers:
    - trigger: time
      at: "09:00:00"
      id: scheduled
    - trigger: state
      entity_id: input_button.coder_devex_audit
      id: manual
  conditions:
    - condition: template
      value_template: "{{ trigger.id == 'manual' or now().weekday() < 5 }}"
  actions:
    - action: coder.create_chat
      data:
        prompt: >-
          Search Linear for issues related to Developer Experience ("Dev Ex").
          Return the top 5 that either need my input or need immediate
          attention.

          For each item give: issue ID, title, priority, one-line reason it
          needs attention, and a link. Plain text, numbered list, terse —
          this will be read on a phone screen.
      response_variable: chat
    - action: input_text.set_value
      target:
        entity_id: input_text.coder_devex_chat_id
      data:
        value: "{{ chat.chat_id }}"
    - action: persistent_notification.create
      data:
        title: "Coder DevEx audit started"
        message: >
          Chat: {{ chat.title or chat.chat_id }}
          Open: YOUR_CODER_URL/chats/{{ chat.chat_id }}
        notification_id: coder_devex_audit_started
    - action: notify.YOUR_MOBILE_NOTIFY_TARGET
      data:
        title: "Coder DevEx audit started"
        message: >
          Reviewing Linear for Dev Ex issues…
          YOUR_CODER_URL/chats/{{ chat.chat_id }}
        data:
          url: "YOUR_CODER_URL/chats/{{ chat.chat_id }}"

- alias: "Coder — DevEx audit (notify when done)"
  description: >
    When the audit chat reaches status=completed, push the link.
  mode: single
  triggers:
    - trigger: event
      event_type: coder_chat_status_changed
      event_data:
        to: completed
  conditions:
    - condition: template
      value_template: >
        {{ trigger.event.data.chat_id == states('input_text.coder_devex_chat_id') }}
  actions:
    - action: persistent_notification.create
      data:
        title: "Coder DevEx audit complete"
        message: >
          Top 5 Dev Ex items ready.
          Open: YOUR_CODER_URL/chats/{{ trigger.event.data.chat_id }}
        notification_id: coder_devex_audit_done
    - action: notify.YOUR_MOBILE_NOTIFY_TARGET
      data:
        title: "Coder DevEx audit complete"
        message: >
          Top 5 Dev Ex items ready.
          YOUR_CODER_URL/chats/{{ trigger.event.data.chat_id }}
        data:
          url: "YOUR_CODER_URL/chats/{{ trigger.event.data.chat_id }}"
